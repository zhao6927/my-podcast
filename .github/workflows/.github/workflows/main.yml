name: Auto Update Podcast RSS

on:
  push:
    branches: [ main ]  # 当 main 分支有变动时触发
  workflow_dispatch:      # 允许你在页面上手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 赋予 Action 写入仓库的权限，非常重要
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install feedgen

      - name: Run RSS Generator
        run: python generate_rss.py

      - name: Commit and Push RSS
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add podcast.xml
          # 如果文件没变化，git commit 会报错，用 || exit 0 忽略它
          git commit -m "chore: update podcast.xml" || exit 0
          git push
